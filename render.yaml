services:
  - type: web
    name: wechat-moments-ops
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
