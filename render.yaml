services:
  - type: web
    name: wechat-moments-ops
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: HOST
        value: 0.0.0.0
      - key: AI_PROVIDER_NAME
        value: 胜算云
      - key: AI_BASE_URL
        value: https://router.shengsuanyun.com/api/v1
      - key: AI_API_TYPE
        value: chat_completions
      - key: AI_MODEL
        value: google/gemini-3.5-flash
      - key: AI_API_KEY
        sync: false
