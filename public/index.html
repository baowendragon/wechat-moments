<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医生 IP 朋友圈运营工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">IP</div>
          <div>
            <h1>朋友圈运营</h1>
            <p>医生 IP 私域内容工作台</p>
          </div>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-item active" data-view="today">今日发布</button>
          <button class="nav-item" data-view="generate">生成文案</button>
          <button class="nav-item" data-view="assets">素材库</button>
          <button class="nav-item" data-view="doctors">医生人设</button>
          <button class="nav-item" data-view="schedule">排期日历</button>
        </nav>
        <div class="sidebar-note">
          <strong>执行原则</strong>
          <span>运营集中生产，咨询师每天按任务发布。</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">MVP v0.1</p>
            <h2 id="viewTitle">今日发布</h2>
          </div>
          <div class="topbar-actions">
            <label class="select-label">
              医生
              <select id="globalDoctor"></select>
            </label>
            <button class="ghost-button" id="refreshBtn" type="button">刷新</button>
          </div>
        </header>

        <section class="view active" id="view-today">
          <div class="toolbar">
            <div class="date-tabs" id="dateTabs"></div>
            <div class="metric-row">
              <div class="metric"><span id="todayCount">0</span><small>今日任务</small></div>
              <div class="metric"><span id="doneCount">0</span><small>已发布</small></div>
              <div class="metric"><span id="pendingCount">0</span><small>待执行</small></div>
            </div>
          </div>
          <div class="task-list" id="todayTasks"></div>
        </section>

        <section class="view" id="view-generate">
          <div class="split-layout">
            <form class="panel form-panel" id="generateForm">
              <div class="panel-header">
                <div>
                  <h3>生成朋友圈</h3>
                  <p>选择医生、人设目标和素材，生成可直接发布的文案。</p>
                </div>
              </div>
              <div class="ai-status" id="aiStatus"></div>

              <div class="form-grid">
                <label>
                  医生
                  <select name="doctorId" id="generateDoctor"></select>
                </label>
                <label>
                  发布目的
                  <select name="goal">
                    <option>建立信任</option>
                    <option>激活咨询</option>
                    <option>项目种草</option>
                    <option>专业科普</option>
                    <option>案例转化</option>
                    <option>节日关怀</option>
                  </select>
                </label>
                <label>
                  客户阶段
                  <select name="customerStage">
                    <option>刚添加微信</option>
                    <option>已咨询未到店</option>
                    <option>老客户维护</option>
                    <option>高意向客户</option>
                  </select>
                </label>
                <label>
                  语气
                  <select name="tone">
                    <option>专业亲和</option>
                    <option>理性可信</option>
                    <option>生活感</option>
                    <option>轻营销</option>
                  </select>
                </label>
                <label>
                  发布日期
                  <input type="date" name="scheduledDate" id="scheduledDate" />
                </label>
                <label>
                  发布时间
                  <input type="time" name="timeSlot" value="09:30" />
                </label>
              </div>

              <div>
                <div class="section-label">选择素材</div>
                <div class="asset-picker" id="assetPicker"></div>
              </div>

              <button class="primary-button full" type="submit">生成并加入排期</button>
            </form>

            <div class="panel result-panel">
              <div class="panel-header">
                <div>
                  <h3>最近生成</h3>
                  <p>生成后可在这里复制、编辑和检查合规风险。</p>
                </div>
              </div>
              <div id="latestGenerated" class="generated-empty">还没有生成新内容。</div>
            </div>
          </div>
        </section>

        <section class="view" id="view-assets">
          <div class="split-layout">
            <form class="panel form-panel" id="assetForm">
              <div class="panel-header">
                <div>
                  <h3>上传素材</h3>
                  <p>图片和视频会保存到本地服务，刷新后仍可下载。</p>
                </div>
              </div>
              <label>
                素材文件
                <input type="file" name="file" accept="image/*,video/*" required />
              </label>
              <div class="form-grid">
                <label>
                  绑定医生
                  <select name="doctorId" id="assetDoctor"></select>
                </label>
                <label>
                  素材类型
                  <select name="category">
                    <option>门诊日常</option>
                    <option>专业科普</option>
                    <option>案例反馈</option>
                    <option>项目介绍</option>
                    <option>医生生活</option>
                    <option>客户反馈</option>
                  </select>
                </label>
                <label>
                  关联项目
                  <input name="project" placeholder="如 光电抗衰、隐形矫正" />
                </label>
                <label>
                  素材名称
                  <input name="name" placeholder="不填则使用文件名" />
                </label>
              </div>
              <label>
                素材说明
                <textarea name="notes" rows="4" placeholder="描述画面内容、适合表达的观点、客户痛点等"></textarea>
              </label>
              <button class="primary-button full" type="submit">保存素材</button>
            </form>
            <div>
              <div class="list-header">
                <h3>素材列表</h3>
                <input id="assetSearch" class="search" placeholder="搜索素材、项目、说明" />
              </div>
              <div class="asset-grid" id="assetGrid"></div>
            </div>
          </div>
        </section>

        <section class="view" id="view-doctors">
          <div class="split-layout">
            <form class="panel form-panel" id="doctorForm">
              <div class="panel-header">
                <div>
                  <h3>新增医生人设</h3>
                  <p>人设越清晰，生成内容越稳定。</p>
                </div>
              </div>
              <div class="form-grid">
                <label>
                  医生姓名
                  <input name="name" required placeholder="如 王医生" />
                </label>
                <label>
                  科室
                  <input name="department" required placeholder="如 皮肤科" />
                </label>
                <label>
                  城市
                  <input name="city" placeholder="如 上海" />
                </label>
                <label>
                  说话风格
                  <select name="style">
                    <option>专业亲和</option>
                    <option>理性可信</option>
                    <option>生活感</option>
                    <option>轻营销</option>
                  </select>
                </label>
              </div>
              <label>
                擅长项目
                <input name="projects" placeholder="用顿号分隔，如 敏感肌修护、光电抗衰" />
              </label>
              <label>
                人设描述
                <textarea name="persona" rows="4" placeholder="医生的专业背景、表达方式、客户感受"></textarea>
              </label>
              <label>
                人设标签
                <input name="tags" placeholder="如 温柔耐心、技术派、审美在线" />
              </label>
              <label>
                禁用表达
                <input name="banned" placeholder="如 保证效果、永久、不反弹、绝对有效" />
              </label>
              <button class="primary-button full" type="submit">保存医生</button>
            </form>
            <div class="doctor-list" id="doctorList"></div>
          </div>
        </section>

        <section class="view" id="view-schedule">
          <div class="panel schedule-tools">
            <div>
              <h3>自动生成排期</h3>
              <p>根据医生已有素材生成 1-14 天朋友圈任务。</p>
            </div>
            <form id="scheduleForm" class="inline-form">
              <select name="doctorId" id="scheduleDoctor"></select>
              <input type="number" name="days" min="1" max="14" value="7" />
              <button class="primary-button" type="submit">生成排期</button>
            </form>
          </div>
          <div class="calendar" id="calendar"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
